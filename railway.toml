# railway.toml — HotLink Cache
# https://docs.railway.app/reference/config-as-code

[build]
builder        = "DOCKERFILE"
dockerfilePath = "Dockerfile"

# NEXT_PUBLIC_* vars must be Docker build args so Next.js bakes them
# into the client bundle at build time.
# Secret vars (SHELBY_API_KEY etc.) are set in Railway dashboard only —
# they are injected at container runtime, not build time.
[build.args]
NEXT_PUBLIC_SHELBY_NETWORK          = "shelbynet"
NEXT_PUBLIC_SHELBY_RPC_URL          = "https://api.shelbynet.shelby.xyz/shelby"
NEXT_PUBLIC_SHELBY_EXPLORER_URL     = "https://explorer.shelby.xyz/shelbynet"
NEXT_PUBLIC_APTOS_FULLNODE_URL      = "https://api.shelbynet.shelby.xyz/v1"
NEXT_PUBLIC_SHELBY_CONTRACT_ADDRESS = "0xc63d6a5efb0080a6029403131715bd4971e1149f7cc099aac69bb0069b3ddbf5"
# Set NEXT_PUBLIC_HOTLINK_MODULE_ADDRESS in Railway Variables after deploy:move

[deploy]
# Railway injects $PORT — the Dockerfile CMD uses it via Next.js standalone
startCommand        = "node apps/web/server.js"
healthcheckPath     = "/api/health"
healthcheckTimeout  = 30
restartPolicyType   = "ON_FAILURE"
restartPolicyMaxRetries = 3
